<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гра з дробами</title>
<style>
/* ============================================================
   FONT (Google Fonts css2 API serves the Cyrillic subset
   automatically via unicode-range; cached for offline use)
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap');

/* ============================================================
   BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: 'Nunito', 'Segoe UI', Verdana, sans-serif;
  background: linear-gradient(135deg, #7b2ff7 0%, #4a9ff5 50%, #ff6ec4 100%);
  background-size: 220% 220%;
  animation: bgShift 16s ease infinite;
  color: #2d2350;
  overflow-x: hidden;
}

@keyframes bgShift {
  0%   { background-position: 0% 0%; }
  50%  { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

#app {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ============================================================
   SCREENS & CARDS
   ============================================================ */
.screen { display: none; width: 100%; max-width: 780px; }
.screen.active { display: block; animation: screenIn .5s cubic-bezier(.22,1.2,.36,1); }

@keyframes screenIn {
  from { opacity: 0; transform: translateY(40px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card {
  background: rgba(255,255,255,.95);
  border-radius: 30px;
  padding: 32px 36px;
  box-shadow: 0 20px 55px rgba(28, 8, 80, .38);
  text-align: center;
}

h1 {
  font-weight: 900;
  font-size: clamp(1.7rem, 4.5vw, 2.5rem);
  background: linear-gradient(90deg, #7c3aed, #ec4899);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 20px;
}

h2 { font-weight: 900; color: #5b21b6; margin-bottom: 14px; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-block;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 15px 38px;
  font-family: inherit;
  font-size: 1.25rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 9px 22px rgba(124, 58, 237, .42);
  transition: transform .16s ease, box-shadow .16s ease;
}
.btn:hover  { transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 28px rgba(124,58,237,.5); }
.btn:active { transform: translateY(0) scale(.98); }
.btn:disabled { opacity: .55; cursor: default; transform: none; }

.btn-secondary {
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  box-shadow: 0 9px 22px rgba(59, 130, 246, .42);
  font-size: 1.05rem;
  padding: 12px 28px;
}

.hidden { display: none !important; }

/* ============================================================
   INPUTS
   ============================================================ */
.text-input, .num-input {
  font-family: inherit;
  font-weight: 800;
  border: 4px solid #c7d2fe;
  border-radius: 18px;
  outline: none;
  background: #fff;
  transition: border-color .2s, box-shadow .2s;
}
.text-input:focus, .num-input:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 0 5px rgba(124, 58, 237, .18);
}

.text-input {
  font-size: 1.2rem;
  padding: 12px 18px;
  width: min(320px, 100%);
  text-align: center;
}

.num-input {
  width: 130px;
  font-size: 2.1rem;
  text-align: center;
  padding: 12px 8px;
  -moz-appearance: textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.input-label {
  display: block;
  font-size: .92rem;
  font-weight: 800;
  color: #7c3aed;
  margin: 6px 0;
}

/* Locked (pre-filled) input in Round 2 */
.lock-wrap { position: relative; display: inline-block; }
.num-input.locked {
  background: #fef3c7;
  border: 4px dashed #f59e0b;
  color: #92400e;
  pointer-events: none;
}
.lock-icon {
  position: absolute;
  top: -12px; right: -12px;
  font-size: 1.5rem;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.25));
  animation: popIn .4s cubic-bezier(.22,1.4,.36,1);
}

/* ============================================================
   ERROR & TOAST
   ============================================================ */
.error-msg {
  min-height: 1.6em;
  margin: 12px 0 4px;
  color: #e11d48;
  font-weight: 800;
  font-size: 1.05rem;
  transition: opacity .2s;
}

.shake { animation: shake .55s cubic-bezier(.36,.07,.19,.97); }
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(5px); }
  30%, 50%, 70% { transform: translateX(-9px); }
  40%, 60% { transform: translateX(9px); }
}

#toast {
  position: fixed;
  left: 50%; top: 18%;
  transform: translateX(-50%) scale(.5);
  background: linear-gradient(135deg, #10b981, #06b6d4);
  color: #fff;
  font-weight: 900;
  font-size: 1.7rem;
  padding: 18px 42px;
  border-radius: 999px;
  box-shadow: 0 14px 34px rgba(6, 182, 212, .5);
  opacity: 0;
  pointer-events: none;
  z-index: 60;
  transition: opacity .25s, transform .25s cubic-bezier(.22,1.4,.36,1);
}
#toast.show { opacity: 1; transform: translateX(-50%) scale(1); }

/* ============================================================
   AVATAR PICKER
   ============================================================ */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(66px, 1fr));
  gap: 12px;
  margin: 14px 0 20px;
  max-height: 320px;
  overflow-y: auto;
  padding: 8px;
}

.avatar-item {
  position: relative;
  border: none;
  background: #eef2ff;
  border-radius: 50%;
  padding: 0;
  aspect-ratio: 1;
  cursor: pointer;
  overflow: hidden;
  transition: transform .18s ease, box-shadow .18s ease;
}
.avatar-item svg { width: 100%; height: 100%; display: block; }
.avatar-item:hover { transform: scale(1.14); z-index: 2; box-shadow: 0 6px 16px rgba(80, 40, 200, .35); }
.avatar-item.selected {
  box-shadow: 0 0 0 5px #ffd166, 0 0 22px 6px rgba(255, 209, 102, .85);
  animation: selectedGlow 1.6s ease-in-out infinite;
}
@keyframes selectedGlow {
  0%, 100% { box-shadow: 0 0 0 5px #ffd166, 0 0 14px 3px rgba(255,209,102,.7); }
  50%      { box-shadow: 0 0 0 5px #ffd166, 0 0 26px 9px rgba(255,209,102,.95); }
}

/* Click ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(124, 58, 237, .35);
  transform: scale(0);
  animation: rippleAnim .55s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(3); opacity: 0; } }

/* ============================================================
   PLAYER CHIPS (setup list)
   ============================================================ */
.player-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 16px 0;
  min-height: 10px;
}
.player-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  background: #ede9fe;
  border-radius: 999px;
  padding: 6px 8px 6px 6px;
  font-weight: 800;
  animation: popIn .4s cubic-bezier(.22,1.4,.36,1);
}
.player-chip .chip-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #fff; flex: none; }
.player-chip .chip-avatar svg { width: 100%; height: 100%; display: block; }
.player-chip button {
  border: none;
  background: #f43f5e;
  color: #fff;
  width: 26px; height: 26px;
  border-radius: 50%;
  font-weight: 900;
  cursor: pointer;
  line-height: 1;
  transition: transform .15s;
}
.player-chip button:hover { transform: scale(1.2); }

@keyframes popIn {
  0%   { transform: scale(.35); opacity: 0; }
  70%  { transform: scale(1.09); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ============================================================
   COMPARISON ROW:  [ ?/? ]  [ > ]  [ 1/2 ]
   Both fractions share the same cell size via CSS variables so
   the row reads like a real mathematical inequality.
   ============================================================ */
.comparison-row {
  --cell-w: 130px;
  --cell-fs: 2.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 4vw, 30px);
  margin: 34px 0 6px;
}

/* Vertical fraction (shared by answer inputs and previous fraction) */
.frac {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.frac-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  width: var(--cell-w, 130px);
  min-height: calc(var(--cell-fs, 2.1rem) * 1.4 + 32px);
  font-size: var(--cell-fs, 2.1rem);
  font-weight: 900;
  color: #312e81;
  background: #eef2ff;
  border: 4px solid #e0e7ff;
  border-radius: 18px;
  padding: 12px 8px;
}
.frac .frac-line, .answer-frac .af-line {
  width: var(--cell-w, 130px);
  height: 6px;
  background: #312e81;
  border-radius: 3px;
  margin: 10px 0;
}

.prev-frac-col { position: relative; display: flex; flex-direction: column; align-items: center; }
.pf-label {
  position: absolute;
  top: -1.9em;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-weight: 800;
  font-size: .92rem;
  color: #6d28d9;
}

/* ============================================================
   GAME SCREEN
   ============================================================ */
.round-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  font-weight: 900;
}
.round-pill {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  color: #fff;
  padding: 7px 22px;
  border-radius: 999px;
  font-size: 1.1rem;
  box-shadow: 0 6px 14px rgba(239, 68, 68, .35);
}
.turn-progress { color: #6d28d9; font-size: 1rem; }

.turn-player-card {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, #ede9fe, #fce7f3);
  border-radius: 24px;
  padding: 12px 30px 12px 14px;
  margin-bottom: 14px;
}
.turn-player-card.pop { animation: popIn .5s cubic-bezier(.22,1.4,.36,1); }
.turn-player-card .tp-avatar {
  width: 88px; height: 88px;
  border-radius: 50%;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 6px 16px rgba(124, 58, 237, .3);
  flex: none;
}
.turn-player-card .tp-avatar svg { width: 100%; height: 100%; display: block; }
.turn-player-card .tp-name { font-size: 1.7rem; font-weight: 900; color: #5b21b6; }

/* Condition badge with pulsing glow */
.cond-badge {
  display: inline-block;
  flex: none;
  white-space: nowrap;
  padding: 10px 26px;
  border-radius: 999px;
  color: #fff;
  font-weight: 900;
  font-size: 1.45rem;
  letter-spacing: 1px;
}
.cond-badge.gt { background: linear-gradient(135deg, #10b981, #059669); animation: glowGt 1.5s ease-in-out infinite; }
.cond-badge.lt { background: linear-gradient(135deg, #f97316, #ef4444); animation: glowLt 1.5s ease-in-out infinite; }
.cond-badge.eq { background: linear-gradient(135deg, #3b82f6, #6366f1); animation: glowEq 1.5s ease-in-out infinite; }
@keyframes glowGt {
  0%, 100% { box-shadow: 0 0 8px 2px rgba(16, 185, 129, .55); transform: scale(1); }
  50%      { box-shadow: 0 0 26px 9px rgba(16, 185, 129, .85); transform: scale(1.05); }
}
@keyframes glowLt {
  0%, 100% { box-shadow: 0 0 8px 2px rgba(239, 68, 68, .55); transform: scale(1); }
  50%      { box-shadow: 0 0 26px 9px rgba(239, 68, 68, .85); transform: scale(1.05); }
}
@keyframes glowEq {
  0%, 100% { box-shadow: 0 0 8px 2px rgba(99, 102, 241, .55); transform: scale(1); }
  50%      { box-shadow: 0 0 26px 9px rgba(99, 102, 241, .85); transform: scale(1.05); }
}

.instruction { font-size: 1.25rem; font-weight: 800; color: #374151; margin: 6px 0; }
.lock-hint { color: #b45309; font-size: 1.1rem; min-height: 1.4em; margin-bottom: 6px; }

/* Answer inputs styled as a stacked fraction, matching .frac-cell */
.answer-frac {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.comparison-row .num-input {
  width: var(--cell-w);
  font-size: var(--cell-fs);
  min-height: calc(var(--cell-fs) * 1.4 + 32px);
}
.comparison-row .num-input::placeholder {
  font-size: .85rem;
  font-weight: 800;
  color: #a5b4fc;
}

/* Side-by-side fraction inputs (screen 2) */
.fraction-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin: 18px 0 6px;
}
.fraction-row .slash { font-size: 4rem; font-weight: 900; color: #7c3aed; transform: rotate(12deg); }

/* ============================================================
   TRANSITION & VICTORY SCREENS
   ============================================================ */
.transition-emoji { font-size: 4.5rem; margin: 10px 0; animation: popIn .6s cubic-bezier(.22,1.4,.36,1); }

.victory-avatars {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin: 18px 0;
}
.victory-avatars .v-avatar {
  width: 76px; height: 76px;
  border-radius: 50%;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 8px 18px rgba(124, 58, 237, .35);
  animation: bounce 1.1s ease-in-out infinite;
}
.victory-avatars .v-avatar svg { width: 100%; height: 100%; display: block; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-22px); }
}

.victory-subtitle { font-size: 1.25rem; font-weight: 800; color: #6d28d9; margin-bottom: 10px; }

.victory-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 14px 0 20px;
}
.victory-list .player-chip { padding-right: 16px; }

/* ============================================================
   CONFETTI CANVAS
   ============================================================ */
#confetti {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 50;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 560px) {
  .card { padding: 22px 14px; }
  .num-input { width: 104px; font-size: 1.7rem; }
  .turn-player-card .tp-avatar { width: 64px; height: 64px; }
  .turn-player-card .tp-name { font-size: 1.3rem; }
  .fraction-row { gap: 10px; }
  .fraction-row .slash { font-size: 3rem; }
  .comparison-row { --cell-w: 96px; --cell-fs: 1.5rem; gap: 12px; }
  .cond-badge { font-size: 1.05rem; padding: 8px 14px; letter-spacing: .5px; }
}

@media (max-width: 430px) {
  .comparison-row { --cell-w: 78px; --cell-fs: 1.25rem; gap: 8px; }
  .comparison-row .num-input, .frac-cell { border-width: 3px; border-radius: 14px; padding: 8px 4px; }
  .frac .frac-line, .answer-frac .af-line { height: 5px; margin: 7px 0; }
  .cond-badge { font-size: .92rem; padding: 7px 10px; letter-spacing: 0; }
  .lock-icon { font-size: 1.15rem; top: -9px; right: -9px; }
}

/* Only below ~360px does the comparison row stack vertically */
@media (max-width: 359px) {
  .comparison-row { flex-direction: column; gap: 16px; }
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div id="toast"></div>

<div id="app">

  <!-- ========== SCREEN 1: PLAYER SETUP ========== -->
  <section id="screen-setup" class="screen active">
    <div class="card">
      <h1 id="setup-title"></h1>
      <input type="text" id="name-input" class="text-input" maxlength="24" autocomplete="off">
      <p class="input-label" id="avatar-label"></p>
      <div class="avatar-grid" id="avatar-grid"></div>
      <div class="error-msg" id="setup-error"></div>
      <button class="btn btn-secondary" id="btn-add-player"></button>
      <div class="player-list" id="player-list"></div>
      <button class="btn hidden" id="btn-start-game"></button>
    </div>
  </section>

  <!-- ========== SCREEN 2: STARTING FRACTION ========== -->
  <section id="screen-fraction" class="screen">
    <div class="card">
      <h1 id="fraction-title"></h1>
      <div class="fraction-row">
        <div>
          <input type="number" id="start-num" class="num-input" min="1" step="1" inputmode="numeric">
          <span class="input-label" id="start-num-label"></span>
        </div>
        <span class="slash">/</span>
        <div>
          <input type="number" id="start-den" class="num-input" min="1" step="1" inputmode="numeric">
          <span class="input-label" id="start-den-label"></span>
        </div>
      </div>
      <div class="error-msg" id="fraction-error"></div>
      <button class="btn" id="btn-lets-go"></button>
    </div>
  </section>

  <!-- ========== SCREENS 3 & 4: GAMEPLAY (shared) ========== -->
  <section id="screen-game" class="screen">
    <div class="card" id="game-card">
      <div class="round-header">
        <span class="round-pill" id="round-pill"></span>
        <span class="turn-progress" id="turn-progress"></span>
      </div>
      <div class="turn-player-card" id="turn-player-card">
        <div class="tp-avatar" id="tp-avatar"></div>
        <div class="tp-name" id="tp-name"></div>
      </div>
      <p class="instruction" id="instruction"></p>
      <p class="instruction lock-hint" id="lock-hint"></p>
      <!-- Math comparison row:  [ ?/? ]  [ > ]  [ 1/2 ]  -->
      <div class="comparison-row">
        <div class="answer-frac">
          <div class="lock-wrap" id="wrap-num">
            <input type="number" id="ans-num" class="num-input" min="1" step="1" inputmode="numeric">
          </div>
          <div class="af-line"></div>
          <div class="lock-wrap" id="wrap-den">
            <input type="number" id="ans-den" class="num-input" min="1" step="1" inputmode="numeric">
          </div>
        </div>
        <span class="cond-badge" id="cond-badge"></span>
        <div class="prev-frac-col">
          <span class="pf-label" id="pf-label"></span>
          <span class="frac" id="pf-frac"></span>
        </div>
      </div>
      <div class="error-msg" id="game-error"></div>
      <button class="btn" id="btn-continue"></button>
    </div>
  </section>

  <!-- ========== TRANSITION: ROUND 2 INTRO ========== -->
  <section id="screen-round2" class="screen">
    <div class="card">
      <div class="transition-emoji">😏</div>
      <h1 id="round2-title"></h1>
      <button class="btn" id="btn-round2-go"></button>
    </div>
  </section>

  <!-- ========== SCREEN 5: VICTORY ========== -->
  <section id="screen-victory" class="screen">
    <div class="card">
      <div class="victory-avatars" id="victory-avatars"></div>
      <h1 id="victory-title"></h1>
      <p class="victory-subtitle" id="victory-subtitle"></p>
      <div class="victory-list" id="victory-list"></div>
      <button class="btn" id="btn-play-again"></button>
    </div>
  </section>

</div>

<script>
"use strict";

/* ============================================================
   STRINGS — all user-facing text in Ukrainian
   ============================================================ */
const STRINGS = {
  whoPlays:        "Хто грає? 🎮",
  playerName:      "Ім'я гравця",
  chooseAvatar:    "Обери аватар",
  addPlayer:       "Додати гравця",
  startGame:       "Почати гру",
  setStartFraction:"Введіть початковий дріб",
  numerator:       "Чисельник",
  denominator:     "Знаменник",
  letsGo:          "Поїхали! 🚀",
  round1:          "Раунд 1",
  round2:          "Раунд 2",
  condGt:          "БІЛЬШЕ >",
  condLt:          "МЕНШЕ <",
  condEq:          "ДОРІВНЮЄ =",
  continueBtn:     "Продовжити ➜",
  prevFraction:    "Попередній дріб:",
  turnOf:          (i, n) => `Хід ${i} з ${n}`,
  instructionGt:   f => `Назви дріб, який БІЛЬШИЙ за ${f}`,
  instructionLt:   f => `Назви дріб, який МЕНШИЙ за ${f}`,
  instructionEq:   f => `Назви дріб, який ДОРІВНЮЄ ${f}`,
  lockedNum:       v => `Чисельник вже заданий: ${v}. Підбери знаменник!`,
  lockedDen:       v => `Знаменник вже заданий: ${v}. Підбери чисельник!`,
  round2Intro:     "Раунд 2! Тепер буде складніше 😏",
  victoryTitle:    "Чудова робота, всі молодці! 🎉",
  victorySubtitle: "Гру завершено! Ви справжні майстри дробів! 🏆",
  playAgain:       "Грати ще раз",
  correct:         "Правильно! 🌟",
  errFillBoth:     "Заповни обидва поля!",
  errZeroDen:      "Знаменник не може дорівнювати нулю!",
  errPositive:     "Чисельник і знаменник мають бути додатними цілими числами!",
  errNotGt:        (a, b) => `Ой! Дріб ${a} не більший за ${b}. Спробуй ще раз! 🤔`,
  errNotLt:        (a, b) => `Ой! Дріб ${a} не менший за ${b}. Спробуй ще раз! 🤔`,
  errNotEq:        (a, b) => `Ой! Дріб ${a} не дорівнює ${b}. Спробуй ще раз! 🤔`,

/* ============================================================
   STATE
   ============================================================ */
const state = {
  players: [],            // [{name, avatarId, turnsTaken}]
  usedKeys: new Set(),    // simplified fraction keys, e.g. "1/2"
  usedExact: new Set(),   // exact fraction strings as entered, e.g. "2/4"
  currentFraction: null,  // {num, den}
  currentRound: 1,
  turnSequence: [],       // pre-generated player indices for the round
  turnIndex: 0,
  lastPlayerIndex: -1,    // who answered last (also across round boundary)
  condition: null,        // 'gt' | 'lt' | 'eq'
  lock: null,             // Round 2 only: {type: 'num'|'den', value}
  selectedAvatarId: null,
  busy: false             // blocks double-submit during success animation
};

const MAX_PLAYERS = 20;
const MIN_PLAYERS = 2;
const TURNS_PER_PLAYER = 3;

/* ============================================================
   UTILS — fraction math (integer only, no floating point)
   ============================================================ */
function gcd(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }

function simplify(num, den) {
  const g = gcd(num, den);
  return { num: num / g, den: den / g };
}

// Compare a/b vs c/d via cross-multiplication
function compare(a, b, c, d) {
  const left = a * d, right = b * c;
  return left > right ? 'gt' : left < right ? 'lt' : 'eq';
}

// Canonical key of the simplified fraction, for deduplication
function fractionKey(num, den) {
  const s = simplify(num, den);
  return `${s.num}/${s.den}`;
}

function fmt(num, den) { return `${num}/${den}`; }

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const $ = id => document.getElementById(id);

/* ============================================================
   TURN SEQUENCE GENERATION
   counts[i] = how many turns player i takes this round.
   No player twice in a row (including across the round boundary).
   ============================================================ */
function generateSequence(counts, prevPlayer) {
  const total = counts.reduce((a, b) => a + b, 0);
  // Shuffle-based: try random permutations of the turn pool
  for (let attempt = 0; attempt < 3000; attempt++) {
    const pool = [];
    counts.forEach((c, i) => { for (let k = 0; k < c; k++) pool.push(i); });
    shuffleArr(pool);
    let ok = pool[0] !== prevPlayer;
    for (let i = 1; ok && i < pool.length; i++) if (pool[i] === pool[i - 1]) ok = false;
    if (ok) return pool;
  }
  // Greedy fallback (always succeeds when an arrangement exists):
  // pick a dominating player when forced, otherwise a random candidate
  const rem = counts.slice(), seq = [];
  let prev = prevPlayer, left = total;
  while (left > 0) {
    let cands = [];
    rem.forEach((r, i) => { if (r > 0 && i !== prev) cands.push(i); });
    if (!cands.length) rem.forEach((r, i) => { if (r > 0) cands.push(i); });
    let pick = cands.find(i => rem[i] * 2 > left);
    if (pick === undefined) pick = cands[Math.floor(Math.random() * cands.length)];
    seq.push(pick); rem[pick]--; left--; prev = pick;
  }
  return seq;
}

// Round 1: ceil(n/2) random players answer twice, the rest once
function startRound1() {
  const n = state.players.length;
  const order = shuffleArr(state.players.map((_, i) => i));
  const twice = new Set(order.slice(0, Math.ceil(n / 2)));
  const counts = state.players.map((_, i) => twice.has(i) ? 2 : 1);
  state.currentRound = 1;
  state.turnSequence = generateSequence(counts, -1);
  state.turnIndex = 0;
}

// Round 2: everyone fills up to exactly 3 answers total
function startRound2() {
  const counts = state.players.map(p => TURNS_PER_PLAYER - p.turnsTaken);
  state.currentRound = 2;
  state.turnSequence = generateSequence(counts, state.lastPlayerIndex);
  state.turnIndex = 0;
}

/* ============================================================
   ANSWER VALIDATION
   For 'eq' the value always matches the previous fraction, so
   dedup for 'eq' is on the EXACT form (a new representation is
   required); for 'gt'/'lt' dedup is on the simplified key.
   ============================================================ */
function checkAnswer(num, den, cond) {
  const cur = state.currentFraction;
  const cmp = compare(num, den, cur.num, cur.den);
  if (cmp !== cond) return { ok: false, reason: 'cond' };
  if (cond === 'eq') {
    if (state.usedExact.has(fmt(num, den))) return { ok: false, reason: 'used' };
  } else {
    if (state.usedKeys.has(fractionKey(num, den))) return { ok: false, reason: 'used' };
  }
  return { ok: true };
}

function registerFraction(num, den) {
  state.usedKeys.add(fractionKey(num, den));
  state.usedExact.add(fmt(num, den));
  state.currentFraction = { num, den };
}

/* ============================================================
   ROUND 2 LOCK GENERATION
   Pre-fill numerator OR denominator, guaranteeing at least one
   valid, unused completion exists (verified by enumeration).
   ============================================================ */
function solutionExists(lockType, v, cond) {
  const s = simplify(state.currentFraction.num, state.currentFraction.den);
  const c = s.num, d = s.den;
  let lo = 1, hi;
  if (cond === 'eq') {
    // exact multiple of the simplified fraction is required
    if (lockType === 'num') {
      if ((v * d) % c !== 0) return false;
      return checkAnswer(v, v * d / c, 'eq').ok;
    } else {
      if ((v * c) % d !== 0) return false;
      return checkAnswer(v * c / d, v, 'eq').ok;
    }
  }
  if (lockType === 'num') {
    // solving for denominator b:  v/b > c/d  <=>  b < v*d/c
    if (cond === 'gt') { hi = Math.ceil(v * d / c) - 1; if (hi < 1) return false; }
    else { lo = Math.floor(v * d / c) + 1; hi = lo + 600; }
    hi = Math.min(hi, lo + 600);
    for (let b = lo; b <= hi; b++) if (checkAnswer(v, b, cond).ok) return true;
  } else {
    // solving for numerator a:  a/v > c/d  <=>  a > v*c/d
    if (cond === 'gt') { lo = Math.floor(v * c / d) + 1; hi = lo + 600; }
    else { hi = Math.ceil(v * c / d) - 1; if (hi < 1) return false; }
    hi = Math.min(hi, lo + 600);
    for (let a = lo; a <= hi; a++) if (checkAnswer(a, v, cond).ok) return true;
  }
  return false;
}

function generateLock(cond) {
  const s = simplify(state.currentFraction.num, state.currentFraction.den);
  const maxV = Math.max(12, 2 * Math.max(s.num, s.den));
  const types = Math.random() < 0.5 ? ['num', 'den'] : ['den', 'num'];
  for (const t of types) {
    // prefer small, kid-friendly values (random for variety)…
    for (let i = 0; i < 40; i++) {
      const v = 1 + Math.floor(Math.random() * 12);
      if (solutionExists(t, v, cond)) return { type: t, value: v };
    }
    // …then widen the random range for tricky fractions…
    for (let i = 0; i < 60; i++) {
      const v = 1 + Math.floor(Math.random() * maxV);
      if (solutionExists(t, v, cond)) return { type: t, value: v };
    }
    // …then a deterministic scan as a safety net
    for (let v = 1; v <= maxV + 80; v++) if (solutionExists(t, v, cond)) return { type: t, value: v };
  }
  return null;
}

// Weighted random condition: "ДОРІВНЮЄ" (eq) is deliberately rare
const COND_WEIGHTS = { gt: 45, lt: 45, eq: 10 };
function pickCondition(prev) {
  const total = COND_WEIGHTS.gt + COND_WEIGHTS.lt + COND_WEIGHTS.eq;
  const roll = () => {
    let r = Math.random() * total;
    for (const c of ['gt', 'lt', 'eq']) { r -= COND_WEIGHTS[c]; if (r < 0) return c; }
    return 'gt';
  };
  // re-roll once if we'd repeat the previous turn's condition
  const first = roll();
  return first === prev ? roll() : first;
}

// Pick the condition (and lock in Round 2), guaranteed solvable
function setupTurnChallenge() {
  const first = pickCondition(state.condition);
  // Round 2 fallback order if `first` has no solvable lock: try the
  // other non-"eq" condition next, keep "eq" as the last resort
  const rest = ['gt', 'lt'].filter(c => c !== first);
  shuffleArr(rest);
  const conds = [first, ...rest];
  if (first !== 'eq') conds.push('eq');
  if (state.currentRound === 1) {
    state.condition = conds[0];
    state.lock = null;
    return;
  }
  for (const c of conds) {
    const lock = generateLock(c);
    if (lock) { state.condition = c; state.lock = lock; return; }
  }
  // Practically unreachable: 'eq' with a fresh multiple always works
  const s = simplify(state.currentFraction.num, state.currentFraction.den);
  let k = 2;
  while (state.usedExact.has(fmt(s.num * k, s.den * k))) k++;
  state.condition = 'eq';
  state.lock = { type: 'num', value: s.num * k };
}

/* ============================================================
   CONFETTI (canvas particles: bursts + victory rain)
   ============================================================ */
const confettiCanvas = $('confetti');
const cctx = confettiCanvas.getContext('2d');
const CONFETTI_COLORS = ['#ffd166', '#ef476f', '#06d6a0', '#4a9ff5', '#ff6ec4', '#f9f871', '#9b5de5'];
let particles = [];
let raining = false;
let confettiRAF = null;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function makeParticle(x, y, burst) {
  const angle = Math.random() * Math.PI * 2;
  const speed = burst ? 4 + Math.random() * 8 : 0;
  return {
    x, y,
    vx: burst ? Math.cos(angle) * speed : (Math.random() - .5) * 1.6,
    vy: burst ? Math.sin(angle) * speed - 3 : 1.5 + Math.random() * 2.5,
    w: 6 + Math.random() * 7,
    h: 4 + Math.random() * 5,
    rot: Math.random() * Math.PI,
    vr: (Math.random() - .5) * .3,
    color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    life: 0,
    maxLife: burst ? 70 + Math.random() * 40 : 400
  };
}

function confettiBurst(x, y, n = 90) {
  for (let i = 0; i < n; i++) particles.push(makeParticle(x, y, true));
  ensureConfettiLoop();
}

function startRain() { raining = true; ensureConfettiLoop(); }
function stopRain()  { raining = false; }

function ensureConfettiLoop() {
  if (confettiRAF) return;
  const step = () => {
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    if (raining) {
      for (let i = 0; i < 3; i++) particles.push(makeParticle(Math.random() * confettiCanvas.width, -12, false));
    }
    particles = particles.filter(p => p.life < p.maxLife && p.y < confettiCanvas.height + 24);
    for (const p of particles) {
      p.life++;
      p.vy += 0.12;
      p.vx *= 0.985;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.globalAlpha = Math.max(0, 1 - p.life / p.maxLife);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      cctx.restore();
    }
    if (particles.length || raining) {
      confettiRAF = requestAnimationFrame(step);
    } else {
      confettiRAF = null;
      cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  };
  confettiRAF = requestAnimationFrame(step);
}

  void el.offsetWidth;
  el.classList.add('active');

  el.textContent = msg;
  const target = shakeEl || el;
  target.classList.remove('shake');
  void target.offsetWidth;
  target.classList.add('shake');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 950);
}

function addRipple(btn, ev) {
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const span = document.createElement('span');
  span.className = 'ripple';
  span.style.width = span.style.height = size + 'px';
  span.style.left = (ev.clientX - rect.left - size / 2) + 'px';
  span.style.top = (ev.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(span);
  setTimeout(() => span.remove(), 600);
}

      grid.querySelectorAll('.avatar-item').forEach(b => b.classList.remove('selected'));

      addRipple(btn, ev);
    });
    grid.appendChild(btn);
  }
}

function renderPlayerList() {
  const list = $('player-list');
  list.innerHTML = '';
  state.players.forEach((p, i) => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `<span class="chip-avatar">${avatarById(p.avatarId).svg}</span><span>${escapeHTML(p.name)}</span>`;
    const rm = document.createElement('button');
    rm.type = 'button';
    rm.textContent = '✕';
    rm.addEventListener('click', () => {
      state.players.splice(i, 1);
      renderPlayerList();
    });
    chip.appendChild(rm);
    list.appendChild(chip);
  });
  $('btn-start-game').classList.toggle('hidden', state.players.length < MIN_PLAYERS);
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function addPlayer() {
  const err = $('setup-error');
  err.textContent = '';
  const name = $('name-input').value.trim();
  if (!name) { showError(err, STRINGS.errNameEmpty, $('name-input')); return; }
  if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    showError(err, STRINGS.errNameDup, $('name-input')); return;
  }
  if (!state.selectedAvatarId) { showError(err, STRINGS.errNoAvatar); return; }
  if (state.players.length >= MAX_PLAYERS) { showError(err, STRINGS.errMaxPlayers); return; }
  state.players.push({ name, avatarId: state.selectedAvatarId, turnsTaken: 0 });
  $('name-input').value = '';
  state.selectedAvatarId = null;
  renderAvatarGrid();
  renderPlayerList();
  $('name-input').focus();
}

/* ============================================================
   SCREEN 2 — STARTING FRACTION
   ============================================================ */
function validatePositiveIntPair(numStr, denStr, errEl, shakeEl) {
  if (numStr === '' || denStr === '') { showError(errEl, STRINGS.errFillBoth, shakeEl); return null; }
  const num = Number(numStr), den = Number(denStr);
  if (den === 0) { showError(errEl, STRINGS.errZeroDen, shakeEl); return null; }
  if (!Number.isInteger(num) || !Number.isInteger(den) || num <= 0 || den <= 0) {
    showError(errEl, STRINGS.errPositive, shakeEl); return null;
  }
  return { num, den };
}

function submitStartFraction() {
  const err = $('fraction-error');
  err.textContent = '';
  const pair = validatePositiveIntPair($('start-num').value.trim(), $('start-den').value.trim(), err, $('screen-fraction').querySelector('.card'));
  if (!pair) return;
  registerFraction(pair.num, pair.den);
  startRound1();
  showScreen('screen-game');
  renderTurn();
}

/* ============================================================
   SCREENS 3 & 4 — GAMEPLAY
   ============================================================ */
function renderTurn() {
  setupTurnChallenge();

  const playerIdx = state.turnSequence[state.turnIndex];
  const player = state.players[playerIdx];
  const cur = state.currentFraction;
  const curStr = fmt(cur.num, cur.den);

  $('round-pill').textContent = state.currentRound === 1 ? STRINGS.round1 : STRINGS.round2;
  $('turn-progress').textContent = STRINGS.turnOf(state.turnIndex + 1, state.turnSequence.length);

  // Player card with pop-in animation (restart it each turn)
  const card = $('turn-player-card');
  card.classList.remove('pop');
  void card.offsetWidth;
  card.classList.add('pop');
  $('tp-avatar').innerHTML = avatarById(player.avatarId).svg;
  $('tp-name').textContent = player.name;

  // Previous fraction (stacked display)
  $('pf-frac').innerHTML = fracHTML(cur.num, cur.den);

  // Condition badge + instruction
  const badge = $('cond-badge');
  badge.className = 'cond-badge ' + state.condition;
  badge.textContent = { gt: STRINGS.condGt, lt: STRINGS.condLt, eq: STRINGS.condEq }[state.condition];
  $('instruction').textContent = {
    gt: STRINGS.instructionGt(curStr),
    lt: STRINGS.instructionLt(curStr),
    eq: STRINGS.instructionEq(curStr)
  }[state.condition];

  // Answer inputs (Round 2 locks one of them)
  const numInput = $('ans-num'), denInput = $('ans-den');
  numInput.value = ''; denInput.value = '';
  numInput.readOnly = false; denInput.readOnly = false;
  numInput.classList.remove('locked'); denInput.classList.remove('locked');
  $('wrap-num').querySelectorAll('.lock-icon').forEach(el => el.remove());
  $('wrap-den').querySelectorAll('.lock-icon').forEach(el => el.remove());
  $('lock-hint').textContent = '';

  if (state.lock) {
    const lockedInput = state.lock.type === 'num' ? numInput : denInput;
    const wrap = state.lock.type === 'num' ? $('wrap-num') : $('wrap-den');
    lockedInput.value = state.lock.value;
    lockedInput.readOnly = true;
    lockedInput.classList.add('locked');
    const icon = document.createElement('span');
    icon.className = 'lock-icon';
    icon.textContent = '🔒';
    wrap.appendChild(icon);
    $('lock-hint').textContent = state.lock.type === 'num'
      ? STRINGS.lockedNum(state.lock.value)
      : STRINGS.lockedDen(state.lock.value);
  }

  $('game-error').textContent = '';
  (state.lock && state.lock.type === 'num' ? denInput : numInput).focus();
}

function submitAnswer() {
  if (state.busy) return;
  const err = $('game-error');
  err.textContent = '';
  const gameCard = $('game-card');

  const pair = validatePositiveIntPair($('ans-num').value.trim(), $('ans-den').value.trim(), err, gameCard);
  if (!pair) return;

  const result = checkAnswer(pair.num, pair.den, state.condition);
  if (!result.ok) {
    const cur = state.currentFraction;
    if (result.reason === 'cond') {
      const msgFn = { gt: STRINGS.errNotGt, lt: STRINGS.errNotLt, eq: STRINGS.errNotEq }[state.condition];
      showError(err, msgFn(fmt(pair.num, pair.den), fmt(cur.num, cur.den)), gameCard);
    } else {
      showError(err, STRINGS.errUsed, gameCard);
    }
    return;
  }

  // Success!
  state.busy = true;
  registerFraction(pair.num, pair.den);
  const playerIdx = state.turnSequence[state.turnIndex];
  state.players[playerIdx].turnsTaken++;
  state.lastPlayerIndex = playerIdx;
  state.turnIndex++;

  showToast(STRINGS.correct);
  const rect = $('btn-continue').getBoundingClientRect();
  confettiBurst(rect.left + rect.width / 2, rect.top, 80);

  setTimeout(() => {
    state.busy = false;
    if (state.turnIndex >= state.turnSequence.length) {
      endRound();
    } else {
      renderTurn();
    }
  }, 1050);
}

function endRound() {
  if (state.currentRound === 1) {
    showScreen('screen-round2');
  } else {
    showVictory();
  }
}

/* ============================================================
   SCREEN 5 — VICTORY
   ============================================================ */
function showVictory() {
  const row = $('victory-avatars');
  row.innerHTML = '';
  state.players.forEach((p, i) => {
    const av = document.createElement('div');
    av.className = 'v-avatar';
    av.style.animationDelay = (i * 0.13) + 's';
    av.innerHTML = avatarById(p.avatarId).svg;
    row.appendChild(av);
  });
  const list = $('victory-list');
  list.innerHTML = '';
  for (const p of state.players) {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `<span class="chip-avatar">${avatarById(p.avatarId).svg}</span><span>${escapeHTML(p.name)}</span>`;
    list.appendChild(chip);
  }
  showScreen('screen-victory');
  startRain();
}

function resetGame() {
  stopRain();
  particles = [];
  state.players.forEach(p => { p.turnsTaken = 0; });
  state.usedKeys.clear();
  state.usedExact.clear();
  state.currentFraction = null;
  state.currentRound = 1;
  state.turnSequence = [];
  state.turnIndex = 0;
  state.lastPlayerIndex = -1;
  state.condition = null;
  state.lock = null;
  state.busy = false;
  $('start-num').value = '';
  $('start-den').value = '';
  $('fraction-error').textContent = '';
  renderPlayerList();
  showScreen('screen-setup');
}

/* ============================================================
   INIT — static Ukrainian labels + event wiring
   ============================================================ */
function initLabels() {
  $('setup-title').textContent = STRINGS.whoPlays;
  $('name-input').placeholder = STRINGS.playerName;
  $('avatar-label').textContent = STRINGS.chooseAvatar;
  $('btn-add-player').textContent = STRINGS.addPlayer;
  $('btn-start-game').textContent = STRINGS.startGame;
  $('fraction-title').textContent = STRINGS.setStartFraction;
  $('start-num-label').textContent = STRINGS.numerator;
  $('start-den-label').textContent = STRINGS.denominator;
  $('btn-lets-go').textContent = STRINGS.letsGo;
  $('pf-label').textContent = STRINGS.prevFraction;
  $('ans-num').placeholder = STRINGS.numerator;
  $('ans-den').placeholder = STRINGS.denominator;
  $('btn-continue').textContent = STRINGS.continueBtn;
  $('round2-title').textContent = STRINGS.round2Intro;
  $('btn-round2-go').textContent = STRINGS.letsGo;
  $('victory-title').textContent = STRINGS.victoryTitle;
  $('victory-subtitle').textContent = STRINGS.victorySubtitle;
  $('btn-play-again').textContent = STRINGS.playAgain;
}

function init() {
  initLabels();
  renderAvatarGrid();

  $('btn-add-player').addEventListener('click', addPlayer);
  $('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

  $('btn-start-game').addEventListener('click', () => {
    if (state.players.length < MIN_PLAYERS) {
      showError($('setup-error'), STRINGS.errMinPlayers);
      return;
    }
    showScreen('screen-fraction');
    $('start-num').focus();
  });

  $('btn-lets-go').addEventListener('click', submitStartFraction);
  ['start-num', 'start-den'].forEach(id =>
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') submitStartFraction(); }));

  $('btn-continue').addEventListener('click', submitAnswer);
  ['ans-num', 'ans-den'].forEach(id =>
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); }));

  $('btn-round2-go').addEventListener('click', () => {
    startRound2();
    showScreen('screen-game');
    renderTurn();
  });

  $('btn-play-again').addEventListener('click', resetGame);
}

init();
</script>
